name: Deploy Landing

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  # 1) CI — build thử (Next build đã gồm type-check; fail = chặn deploy)
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  # 2) CD — SSH vào VPS: clone (lần đầu) / pull, build image, chạy lại container
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            if [ -d /root/cucquy/landing/.git ]; then
              cd /root/cucquy/landing && git pull origin main
            else
              cd /root/cucquy && git clone https://github.com/CucQuy/CucQuyLanding.git landing && cd landing
            fi
            docker build -t cucquy-landing .
            docker stop cucquy-landing || true
            docker rm cucquy-landing || true
            docker run -d --name cucquy-landing --restart unless-stopped -p 127.0.0.1:8090:80 cucquy-landing
            docker image prune -f
