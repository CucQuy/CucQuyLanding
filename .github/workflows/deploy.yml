name: Deploy Landing

# Push lên main → build image trên runner GitHub → push GHCR → VPS pull.
# VPS KHÔNG build nữa (tránh OOM máy 1.4GB).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/cucquy/cucquy-landing

jobs:
  # 1) CI — build thử (Next build gồm type-check; fail = chặn deploy)
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build

  # 2) Build image + push GHCR
  build-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  # 3) Deploy — SSH vào VPS: login GHCR, pull image mới, chạy lại container
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            docker pull ghcr.io/cucquy/cucquy-landing:latest
            docker stop cucquy-landing || true
            docker rm cucquy-landing || true
            docker run -d --name cucquy-landing --restart unless-stopped -p 127.0.0.1:8090:80 ghcr.io/cucquy/cucquy-landing:latest
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
